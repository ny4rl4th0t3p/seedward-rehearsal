project_name: seedward-rehearsal

builds:
  - id: rehearse
    main: ./cmd/rehearse
    binary: rehearse
    ldflags:
      - -X github.com/ny4rl4th0t3p/seedward-rehearsal/internal/version.Version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: rehearsald
    main: ./cmd/rehearsald
    binary: rehearsald
    ldflags:
      - -X github.com/ny4rl4th0t3p/seedward-rehearsal/internal/version.Version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: archive
    builds:
      - rehearse
      - rehearsald
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - '^chore'
      - '^ci'
      - '^Merge (pull request|branch)'
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Bug Fixes
      regexp: '^fix'
      order: 1
    - title: Performance
      regexp: '^perf'
      order: 2
    - title: Refactors
      regexp: '^refactor'
      order: 3
    - title: Documentation
      regexp: '^docs'
      order: 4
    - title: Other
      order: 999

release:
  github:
    owner: ny4rl4th0t3p
    name: seedward-rehearsal